version: '3.8'

services:
  adminer:
    image: adminer:latest
    container_name: indiaangelforum-adminer
    ports:
      - "8083:8080"
    environment:
      ADMINER_DEFAULT_SERVER: host.docker.internal
      ADMINER_DESIGN: pepa-linha
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: indiaangelforum-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --appendfsync everysec
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
    driver: local
