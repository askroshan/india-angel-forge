    <!-- JSON-LD: FAQPage (AEO — answers surfaced by AI assistants) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is India Angel Forum?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "India Angel Forum (IAF) is India's largest angel investing network, founded in 2024. It connects 400+ SEBI-compliant accredited investors with exceptional early-stage startups. The platform has deployed ₹160+ crore across 40+ portfolio companies and delivers an average IRR of 27%."
          }
        },
        {
          "@type": "Question",
          "name": "How do I join India Angel Forum as an investor?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Apply at indiaangelforum.com/apply/investor. You must be an accredited investor under SEBI guidelines. Membership plans start at ₹36,000/year (Operator Angel) and ₹60,000/year (Standard). After application review, you gain access to curated deal flow, monthly forums, and SPV co-investment opportunities."
          }
        },
        {
          "@type": "Question",
          "name": "How do startups apply to India Angel Forum for funding?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Founders apply for free at indiaangelforum.com/apply/founder. Only the top 1% of applications are selected for presentation at monthly forums. If selected, a forum showcase fee of ₹50,000 applies. On average, selected startups raise ₹1–5 crore from IAF members."
          }
        },
        {
          "@type": "Question",
          "name": "What sectors does India Angel Forum invest in?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "India Angel Forum invests across AI & Machine Learning, SaaS & Enterprise Software, FinTech, HealthTech, Consumer Technology, Deep Tech, and Climate Tech. The network uses sector-specific due diligence criteria aligned with ACA (Angel Capital Association) best practices."
          }
        },
        {
          "@type": "Question",
          "name": "Is India Angel Forum SEBI compliant?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. India Angel Forum is compliant with SEBI (Alternative Investment Funds) Regulations, the IT Act 2000, and the DPDP Act 2023. The platform is DPIIT-recognised and investments qualify for Section 80-IAC tax benefits under the Startup India programme."
          }
        },
        {
          "@type": "Question",
          "name": "What is the average return on investment at India Angel Forum?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "India Angel Forum members have achieved an average IRR of 27% across the portfolio. The network has deployed ₹160+ crore across 40+ startups since its founding. Past performance is not indicative of future results, and angel investing carries substantial risk including potential total loss."
          }
        },
        {
          "@type": "Question",
          "name": "What is an SPV and how does India Angel Forum use them?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An SPV (Special Purpose Vehicle) is a legal entity created to pool investment from multiple angels into a single startup. India Angel Forum has deployed 40+ SPVs in 2024, allowing members to co-invest with minimum ticket sizes while maintaining transparent economics and clear pro-rata rights."
          }
        },
        {
          "@type": "Question",
          "name": "What are the membership fees for India Angel Forum?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "India Angel Forum offers three membership tiers: Standard at ₹60,000/year (full deal flow access), Operator Angel at ₹36,000/year (40% discount for active operators), and Family Office at ₹2,50,000/year (up to 3 seats with dedicated relationship manager)."
          }
        }
      ]
    }
    </script>
